<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Windows Server 2008 CloudWatch Agent certificate fix architecture</title>
  <desc id="desc">Architecture diagram showing a Windows Server 2008 EC2 instance in a private subnet connecting through a VPC endpoint to CloudWatch, with TLS patching and Amazon Root CA import fixing certificate validation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7f4ee"/>
      <stop offset="100%" stop-color="#ebe7df"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#1f2933" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3d6b53"/>
    </marker>
    <marker id="arrowMuted" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8c8275"/>
    </marker>
    <style>
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2f3338; }
      .small { font-size: 24px; }
      .body { font-size: 28px; font-weight: 560; }
      .title { font-size: 42px; font-weight: 680; }
      .muted { fill: #746d63; font-size: 22px; }
      .box { fill: #fffdf8; stroke: #d8d0c4; stroke-width: 2; }
      .soft { fill: #f3efe7; stroke: #d7cec1; stroke-width: 2; }
      .green { stroke: #3d6b53; }
      .red { stroke: #a6574a; }
      .line { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="92" y="94" class="label title">CloudWatch Agent 证书链修复架构</text>
  <text x="94" y="134" class="label muted">Windows Server 2008 私有网络实例：补丁 + 根证书 + VPC Endpoint</text>

  <rect x="80" y="180" width="1440" height="580" rx="28" fill="#faf7f0" stroke="#d7cec1" stroke-width="2"/>
  <text x="112" y="232" class="label body">VPC</text>

  <rect x="128" y="274" width="472" height="390" rx="24" fill="#f0ece4" stroke="#d6cec1" stroke-width="2"/>
  <text x="162" y="322" class="label body">Private Subnet</text>

  <g filter="url(#shadow)">
    <rect x="176" y="372" width="320" height="172" rx="22" class="box"/>
    <rect x="210" y="414" width="82" height="86" rx="12" fill="#2e3237"/>
    <rect x="226" y="430" width="50" height="8" rx="4" fill="#6f7781"/>
    <rect x="226" y="452" width="50" height="8" rx="4" fill="#6f7781"/>
    <rect x="226" y="474" width="50" height="8" rx="4" fill="#6f7781"/>
    <text x="320" y="434" class="label body">EC2</text>
    <text x="320" y="474" class="label small">Windows Server 2008</text>
    <text x="320" y="510" class="label muted">CloudWatch Agent</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="690" y="370" width="280" height="178" rx="22" class="box"/>
    <path d="M735 448c0-35 27-62 62-62 27 0 50 17 59 40 32 1 58 28 58 60 0 4 0 8-1 12H748c-30 0-54-22-54-50 0-25 18-46 41-50z" fill="#ede7dc" stroke="#cfc5b5" stroke-width="3"/>
    <text x="742" y="592" class="label body">Interface Endpoint</text>
    <text x="748" y="630" class="label muted">monitoring.region.amazonaws.com.cn</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1100" y="344" width="302" height="230" rx="28" class="box"/>
    <path d="M1172 440c0-38 30-68 68-68 29 0 54 18 64 44 35 2 64 31 64 67 0 5-1 9-2 13h-178c-35 0-64-25-64-56 0-27 20-50 48-54z" fill="#f1ece4" stroke="#cec4b7" stroke-width="3"/>
    <polyline points="1166,522 1208,488 1244,504 1288,456 1330,476" fill="none" stroke="#3d6b53" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1150" y="624" class="label body">CloudWatch API</text>
    <text x="1150" y="662" class="label muted">Metrics HTTPS 443</text>
  </g>

  <path d="M496 458 C574 458 600 458 674 458" class="line red" stroke-dasharray="14 14" marker-end="url(#arrowMuted)"/>
  <text x="522" y="420" class="label muted">证书链验证失败</text>

  <path d="M970 458 C1020 458 1054 458 1092 458" class="line green" marker-end="url(#arrow)"/>
  <text x="1004" y="420" class="label muted">修复后正常上报</text>

  <g filter="url(#shadow)">
    <rect x="426" y="660" width="292" height="150" rx="22" class="soft"/>
    <circle cx="482" cy="735" r="34" fill="#a6574a" opacity="0.12"/>
    <path d="M466 735h32M482 719v32" stroke="#a6574a" stroke-width="7" stroke-linecap="round"/>
    <text x="536" y="724" class="label body">TLS/SHA-2 Patch</text>
    <text x="536" y="762" class="label muted">先补旧系统能力</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="782" y="660" width="338" height="150" rx="22" class="soft"/>
    <circle cx="840" cy="735" r="34" fill="#3d6b53" opacity="0.14"/>
    <path d="M822 735l13 14 28-32" fill="none" stroke="#3d6b53" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="894" y="724" class="label body">Amazon Root CA 1</text>
    <text x="894" y="762" class="label muted">导入受信任根证书</text>
  </g>

  <path d="M572 660 C562 602 512 566 426 536" class="line" stroke="#8c8275" marker-end="url(#arrowMuted)"/>
  <path d="M950 660 C902 594 864 568 836 548" class="line green" marker-end="url(#arrow)"/>
</svg>
